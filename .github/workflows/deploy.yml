name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      subpage:
        description: 'Subpage path (overrides repo name default)'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for gh-pages branch push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # BASE_PATH must match your GitHub repo name (or chosen subpage path)
        # e.g. if repo is amcaw/my-widget → BASE_PATH=my-widget
        env:
          BASE_PATH: ${{ vars.BASE_PATH || github.event.repository.name }}
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
