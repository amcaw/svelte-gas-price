name: Update fuel prices

on:
  push:
    branches: [main]
  schedule:
    # SPF prices + carbu.com — 10:00 Brussels (09:00 UTC)
    - cron: '0 9 * * *'
    # carbu.com only — 13:00 Brussels (12:00 UTC)
    - cron: '0 12 * * *'
    # carbu.com only — 20:00 Brussels (19:00 UTC)
    - cron: '0 19 * * *'
  workflow_dispatch: {}

# Prevent infinite loop: skip if the push was made by the bot itself
concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update-spf:
    name: Fetch SPF prices (08:00 only)
    runs-on: ubuntu-latest
    # On push: run for all non-bot commits. On schedule: only the 07:00 UTC trigger.
    if: |
      (github.event_name == 'push' && github.actor != 'github-actions[bot]') ||
      github.event.schedule == '0 9 * * *' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch SPF prices
        run: node scripts/fetch-prices.js

      - name: Check if data changed
        id: diff
        run: |
          git diff --quiet public/data/prices.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/prices.json
          git commit -m "chore: update SPF prices $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Trigger deploy
        if: steps.diff.outputs.changed == 'true'
        run: gh workflow run deploy.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-best-prices:
    name: Fetch carbu.com best prices
    runs-on: ubuntu-latest
    # Skip if the push was made by the bot (avoid infinite loop)
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch best prices (carbu.com)
        run: node scripts/fetch-best-prices.js

      - name: Check if data changed
        id: diff
        run: |
          git diff --quiet public/data/best-prices.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/best-prices.json
          git commit -m "chore: update best prices $(date -u +"%Y-%m-%d %H:%M")"
          git pull --rebase
          git push

      - name: Trigger deploy
        if: steps.diff.outputs.changed == 'true'
        run: gh workflow run deploy.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
