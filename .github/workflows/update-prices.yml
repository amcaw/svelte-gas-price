name: Update fuel prices

on:
  push:
    branches: [main]
  schedule:
    # SPF prices + carbu.com — 10:00 Brussels (08:00 UTC summer / 09:00 UTC winter)
    - cron: '0 6 * * *'
    # carbu.com only — 13:00 Brussels (11:00 UTC summer)
    - cron: '0 9 * * *'
    # carbu.com only — 20:00 Brussels (18:00 UTC summer)
    - cron: '0 16 * * *'
  workflow_dispatch: {}

# Prevent infinite loop: skip if the push was made by the bot itself
concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update-spf:
    name: Fetch SPF prices (10:00 only)
    runs-on: ubuntu-latest
    # On push: run for all non-bot commits. On schedule: only the 09:00 UTC trigger.
    if: |
      (github.event_name == 'push' && github.actor != 'github-actions[bot]') ||
      github.event.schedule == '0 6 * * *' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch SPF prices
        run: node scripts/fetch-prices.js

      - name: Check if data changed
        id: diff
        run: |
          git diff --quiet public/data/prices.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/prices.json
          git commit -m "chore: update SPF prices $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Update data/prices.json on gh-pages directly
        if: steps.diff.outputs.changed == 'true'
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          cp public/data/prices.json /tmp/gh-pages/data/prices.json
          cd /tmp/gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "chore: update prices data $(date -u +%Y-%m-%d)"
          git push origin gh-pages

  update-best-prices:
    name: Fetch carbu.com best prices
    runs-on: ubuntu-latest
    # Skip if the push was made by the bot (avoid infinite loop)
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch best prices (carbu.com)
        run: node scripts/fetch-best-prices.js

      - name: Check if data changed
        id: diff
        run: |
          git diff --quiet public/data/best-prices.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/best-prices.json
          git commit -m "chore: update best prices $(date -u +"%Y-%m-%d %H:%M")"
          git pull --rebase
          git push

      - name: Update data/best-prices.json on gh-pages directly
        if: steps.diff.outputs.changed == 'true'
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          cp public/data/best-prices.json /tmp/gh-pages/data/best-prices.json
          cd /tmp/gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/best-prices.json
          git diff --staged --quiet || git commit -m "chore: update best-prices data $(date -u +"%Y-%m-%d %H:%M")"
          git push origin gh-pages
